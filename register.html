<!DOCTYPE html>
<html>
<head>
<title>MUNDRO PES CHAMPIONSHIP - Register</title>

<link rel="stylesheet" href="css/register.css">

</head>

<body>

<div class="container">

<h1>🏆 MUNDRO PES CHAMPIONSHIP</h1>

<h2>Player Registration</h2>

<form id="registerForm">

<input type="text" id="name" placeholder="Player Name" required>

<input type="text" id="team" placeholder="Team Name" required>

<input type="text" id="username" placeholder="PES Username" required>

<input type="text" id="phone" placeholder="Telegram / Phone Number" required>

<button type="submit">Register</button>

</form>

</div>

<script src="js/register.js"></script>

</body>
</html>
